set -g prefix C-a
setw -g mode-keys vi

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
set -ag terminal-overrides ",*256col*:Tc"

set -sg escape-time 0
set -g history-limit 500000
set -g focus-events on

set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

set -g mouse on

# Auto-enter copy-mode when scrolling up (critical for WSL compatibility)
# This handles: 1) apps with mouse support, 2) already in copy-mode, 3) normal pane
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Scroll bindings in copy-mode (both vi and emacs modes)
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down

# Clipboard integration (drag-to-copy)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

unbind r
bind r source-file ~/.tmux.conf
bind H split-window -h
bind V split-window -v

set-option -g pane-border-status top
set -g pane-border-format " [ #P ] "
setw -g automatic-rename off
set -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}'

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Splits and new windows inherit the working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Clipboard
set -g allow-passthrough on
set -s set-clipboard on

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-ghostty:RGB"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:usstyle:overline"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane background dimming (inactive darker, active lighter)
set -g window-style 'bg=#14151e'
set -g window-active-style 'bg=#1a1b26'
set -g pane-border-style 'fg=#3b4252'
set -g pane-active-border-style 'fg=#4a6fa5'

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#2e3440,bg=#5e81ac,bold] #S "
setw -g window-status-format "#[fg=#d8dee9,bg=#3b4252] #I #W "
setw -g window-status-current-format "#[fg=#2e3440,bg=#88c0d0,bold] #I #W "
set -g status-right "#[fg=#2e3440,bg=#5e81ac,bold] %b %d #[fg=#2e3440,bg=#88c0d0,bold] %H:%M "

